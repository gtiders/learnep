# =============================================================================
#                    LearnEP - NEP 主动学习配置文件
# =============================================================================
#
# 使用说明：
#   1. 复制此文件并根据你的系统修改
#   2. 路径规则：相对路径以 work_dir 为基准，绝对路径直接使用
#   3. 运行命令：learnep config.yaml
#
# 工作流程：
#   iter_1 → iter_2 → iter_3 → ... → 收敛
#   每轮：GPUMD探索 → MaxVol筛选 → VASP标注 → NEP训练 → 更新活跃集
#
# =============================================================================


# #############################################################################
#                              全局设置
# #############################################################################

global:
  # ---------------------------------------------------------------------------
  # 工作目录和迭代控制
  # ---------------------------------------------------------------------------
  
  work_dir: "./work"             # 工作目录（所有迭代文件存放于此）
  max_iterations: 100            # 最大迭代次数（达到后检查收敛状态）
  max_structures_per_iteration: 50  # 每轮最多标注的结构数（上限，非强制）
  log_file: "active_learning.log"   # 日志文件路径

  # ---------------------------------------------------------------------------
  # 初始文件（灵活配置，支持三种模式）
  # ---------------------------------------------------------------------------
  # 
  # 模式 1: 完整模式 - 提供 NEP + 训练数据（正常启动）
  #   initial_nep_model: "nep.txt"
  #   initial_nep_restart: "nep.restart"
  #   initial_train_data: "train.xyz"
  #
  # 模式 2: 无数据模式 - 仅提供 NEP（冷启动）
  #   initial_nep_model: "nep.txt"
  #   initial_nep_restart: "nep.restart"
  #   initial_train_data: ""  # 留空或注释掉
  #
  # 模式 3: 无模型模式 - 仅提供训练数据（需先运行 learnep-first-train）
  #   initial_nep_model: ""  # 留空
  #   initial_nep_restart: ""  # 留空
  #   initial_train_data: "train.xyz"
  
  initial_nep_model: "nep.txt"        # 初始 NEP 势函数文件（可选）
  initial_nep_restart: "nep.restart"  # 初始 NEP 重启文件（可选）
  initial_train_data: "train.xyz"     # 初始训练数据（可选，空文件触发冷启动）

  # ---------------------------------------------------------------------------
  # 作业调度系统配置
  # ---------------------------------------------------------------------------
  # 支持的调度系统：PBS/Torque, SLURM, LSF
  
  submit_command: "qsub job.sh"     # 任务提交命令
  check_interval: 30                 # 状态检查间隔（秒）
  
  scheduler_type: "pbs"              # 调度系统类型
    # 可选值：
    # - "pbs"   : PBS/Torque 调度系统（默认）
    # - "slurm" : SLURM 调度系统
    # - "lsf"   : IBM LSF 调度系统
    # - "auto"  : 自动检测
  
  job_status_command: "qstat {job_id}"  # 状态查询命令
    # PBS   : "qstat {job_id}"
    # SLURM : "squeue -j {job_id}"
    # LSF   : "bjobs {job_id}"


# #############################################################################
#                           VASP 配置（DFT 标注）
# #############################################################################

vasp:
  # ---------------------------------------------------------------------------
  # 输入文件列表
  # ---------------------------------------------------------------------------
  # 灵活指定需要复制到任务目录的文件
  # 文件名会保持不变（例如 input/INCAR 复制后仍为 INCAR）
  # 程序会自动生成 POSCAR
  
  input_files:
    - "input/INCAR"       # INCAR 文件
    - "input/POTCAR"      # POTCAR 文件
    - "input/KPOINTS"     # KPOINTS 文件（如果不需要可删除）
    # - "input/WAVECAR"   # 可选：WAVECAR 文件
    # - "input/CHGCAR"    # 可选：CHGCAR 文件

  # ---------------------------------------------------------------------------
  # 作业脚本
  # ---------------------------------------------------------------------------
  # 注意：程序会自动在脚本末尾添加 "touch DONE" 标记
  
  job_script: |
    #!/bin/bash
    #PBS -S /bin/bash
    #PBS -N vasp_dft
    #PBS -q six_hours
    #PBS -l walltime=1:00:00
    #PBS -l nodes=1:ppn=40
    #PBS -V
    cd ${PBS_O_WORKDIR}

    # Intel 环境（根据你的系统修改）
    source /opt/intel/compilers_and_libraries_2018/linux/bin/compilervars.sh intel64
    source /opt/intel/mkl/bin/mklvars.sh intel64
    source /opt/intel/impi/2018.1.163/bin64/mpivars.sh

    mpirun -np 40 /opt/software/vasp/vasp.5.4.4/vasp_std > vasp.log

  # ---------------------------------------------------------------------------
  # 超时设置
  # ---------------------------------------------------------------------------
  
  timeout: 43200  # 12 小时（等待所有 VASP 任务完成的总时长上限）


# #############################################################################
#                          NEP 配置（模型训练）
# #############################################################################

nep:
  # ---------------------------------------------------------------------------
  # 训练参数（主动学习过程中使用）
  # ---------------------------------------------------------------------------
  # 继续训练时从 nep.restart 开始，通常 generation 数可以较少
  
  input_content: |
    type       2 Si O          # 元素类型数量和元素符号
    cutoff     6 5             # 径向和角向截断半径（Å）
    n_max      4 4             # 径向和角向基函数数量
    basis_size 8 8             # 基组大小
    l_max      4 2 1           # 角动量参数
    neuron     80              # 神经网络隐藏层神经元数
    batch      1000            # 批处理大小
    generation 100000          # 训练代数
    population 50              # 种群大小
    lambda_1   0.05            # L1 正则化系数
    lambda_2   0.05            # L2 正则化系数
    lambda_e   1.0             # 能量损失权重
    lambda_f   1.0             # 力损失权重
    lambda_v   0.1             # 应力损失权重

  # ---------------------------------------------------------------------------
  # 首次训练参数（learnep-first-train 使用）
  # ---------------------------------------------------------------------------
  # 从零开始训练时需要更多的 generation
  
  first_input_content: |
    type       2 Si O
    cutoff     6 5
    n_max      4 4
    basis_size 8 8
    l_max      4 2 1
    neuron     80
    batch      1000
    generation 500000          # 从头训练需要更多代数
    population 50
    lambda_1   0.05
    lambda_2   0.05
    lambda_e   1.0
    lambda_f   1.0
    lambda_v   0.1

  # ---------------------------------------------------------------------------
  # 作业脚本
  # ---------------------------------------------------------------------------
  
  job_script: |
    #!/bin/bash
    #PBS -N nep_train
    #PBS -q gpuQ
    #PBS -l walltime=72:00:00
    #PBS -l nodes=1:ppn=1
    #PBS -W x=GRES:gpu@1
    #PBS -S /bin/bash
    #PBS -V
    cd $PBS_O_WORKDIR

    nep > nep.log

  # ---------------------------------------------------------------------------
  # 超时和修剪设置
  # ---------------------------------------------------------------------------
  
  timeout: 259200  # 72 小时

  # 训练集修剪（当结构过多时使用 MaxVol 精简）
  prune_train_set: true        # 是否启用修剪
  max_structures_factor: 1.0   # 最大结构数 = MaxVol Linearized Basis Dimension (B_projection, ~960) × 此系数
                               # 注意：不是基于 NEP 输入描述符维度 (~30)
                               # 例如：基组维度960 × 1.0 = 最多960个结构


# #############################################################################
#                       GPUMD 配置（分子动力学探索）
# #############################################################################
# 
# 关键说明：
#   - 每个 condition 的 run_in 必须包含 compute_extrapolation 指令
#   - compute_extrapolation 参数：
#       compute_extrapolation <asi_file> <check_interval> <dump_interval> <gamma_low> <gamma_high>
#   - gamma_low: 低于此值的结构视为模型已覆盖
#   - gamma_high: 高于此值的结构会被保存用于标注
#

gpumd:
  # ---------------------------------------------------------------------------
  # 探索条件（支持多条件并行运行）
  # ---------------------------------------------------------------------------
  
  conditions:
    # 条件 1：300K NVT 模拟
    - id: "300K_NVT"
      structure_file: "input/model_300K.xyz"  # 初始结构
      run_in_content: |
        potential nep.txt
        velocity 300
        ensemble nvt_ber 300 300 100
        time_step 1
        # compute_extrapolation <asi_file> <check_interval> <dump_interval> <gamma_low> <gamma_high>
        compute_extrapolation active_set.asi 100 1000 1.0 10.0
        run 100000

    # 条件 2：1000K NVT 模拟（高温探索）
    - id: "1000K_NVT"
      structure_file: "input/model_1000K.xyz"
      run_in_content: |
        potential nep.txt
        velocity 1000
        ensemble nvt_ber 1000 1000 100
        time_step 1
        compute_extrapolation active_set.asi 100 1000 1.0 10.0
        run 100000

    # 条件 3：500K NPT 模拟（变体积探索）
    - id: "NPT_500K"
      structure_file: "input/model_npt.xyz"
      run_in_content: |
        potential nep.txt
        velocity 500
        ensemble npt_scr 500 500 100 0 0 0 1000
        time_step 1
        compute_extrapolation active_set.asi 100 1000 1.0 10.0
        run 100000

  # ---------------------------------------------------------------------------
  # 作业脚本
  # ---------------------------------------------------------------------------
  
  job_script: |
    #!/bin/bash
    #PBS -N gpumd
    #PBS -q gpuQ
    #PBS -l walltime=24:00:00
    #PBS -l nodes=1:ppn=1
    #PBS -W x=GRES:gpu@1
    #PBS -S /bin/bash
    #PBS -V
    cd $PBS_O_WORKDIR

    gpumd > gpumd.log

  # ---------------------------------------------------------------------------
  # 超时设置
  # ---------------------------------------------------------------------------
  
  timeout: 86400  # 24 小时


# #############################################################################
#                          结构选择配置
# #############################################################################

selection:
  # ---------------------------------------------------------------------------
  # 选择方法
  # ---------------------------------------------------------------------------
  
  method: "maxvol"
    # 可选值：
    # - "maxvol"     : 使用 MaxVol 算法选择最有价值的结构（默认）
    #                  如果选出的数量超过上限，使用贪婪算法筛选
    # - "maxvol_fps" : 先 MaxVol 选择，再用 FPS 二次筛选
    #                  适合候选结构非常多（>1000）的情况

  # ---------------------------------------------------------------------------
  # MaxVol 算法参数
  # ---------------------------------------------------------------------------
  
  gamma_tol: 1.001       # 收敛阈值（越接近 1 越严格）
  batch_size: 10000      # 批处理大小（内存不足时减小）

  # ---------------------------------------------------------------------------
  # FPS 参数（仅 method="maxvol_fps" 时使用）
  # ---------------------------------------------------------------------------
  
  fps_min_distance: 0.01  # 初始最小距离阈值（会自动调整）


# #############################################################################
#                    冷启动模式配置（从少量数据开始）
# #############################################################################
#
# 使用场景：
#   当初始训练数据不足以运行 MaxVol 算法时（任一元素的原子数 < 描述符维度），
#   系统会自动切换到冷启动模式。
#
# 工作原理：
#   1. 使用 dump_exyz 保存 MD 轨迹（不依赖 gamma 值）
#   2. 过滤不合理的结构（原子重叠、力过大、能量异常）
#   3. 使用 FPS 选择多样性结构
#   4. 数据足够后自动切换到正常模式
#

bootstrap:
  # ---------------------------------------------------------------------------
  # 启用开关
  # ---------------------------------------------------------------------------
  
  enabled: true  # 是否启用自动冷启动（建议保持 true）

  # ---------------------------------------------------------------------------
  # 冷启动探索条件
  # ---------------------------------------------------------------------------
  # 注意：run_in 中必须包含 dump_exyz 命令，不应使用 compute_extrapolation
  # dump_exyz 参数：dump_exyz <interval> <has_velocity> <has_force>
  
  conditions:
    # 条件 1：300K 探索
    - id: "bootstrap_300K"
      structure_file: "input/structure.xyz"
      run_in: |
        potential nep.txt
        velocity 300
        time_step 1
        ensemble npt_scr 300 300 100 0 0 0 100
        dump_exyz 100 1 1   # 每 100 步保存一个结构
        run 10000

    # 条件 2：600K 探索（更高温度增加多样性）
    - id: "bootstrap_600K"
      structure_file: "input/structure.xyz"
      run_in: |
        potential nep.txt
        velocity 600
        time_step 1
        ensemble npt_scr 600 600 100 0 0 0 100
        dump_exyz 100 1 1
        run 10000

  # ---------------------------------------------------------------------------
  # 作业脚本
  # ---------------------------------------------------------------------------
  
  job_script: |
    #!/bin/bash
    #PBS -N bootstrap
    #PBS -q gpuQ
    #PBS -l nodes=1:ppn=1
    #PBS -W x=GRES:gpu@1
    cd $PBS_O_WORKDIR
    gpumd

  # ---------------------------------------------------------------------------
  # 结构过滤参数（用于剔除不合理的结构）
  # ---------------------------------------------------------------------------
  # 注意：冷启动模式下会跳过力检测（因为 NEP 模型不可靠）
  # 只检查原子重叠和能量异常
  
  filter:
    min_distance: 1.0         # 最小原子间距（Å）
                              # 小于此值视为原子重叠，会被剔除
    
    max_force: 50.0           # 最大原子力（eV/Å）
                              # 注意：冷启动模式下此参数被忽略（跳过力检测）
                              # 正常模式下会使用此阈值
    
    max_energy_per_atom: 5.0  # 最大能量偏差（eV/atom）
                              # 相对于中位数能量的偏差上限

  # ---------------------------------------------------------------------------
  # 超时设置
  # ---------------------------------------------------------------------------
  
  timeout: 86400  # 24 小时
