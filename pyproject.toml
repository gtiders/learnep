[project]
name = "learnep"
version = "0.2.0"
description = "基于 MaxVol 算法的 NEP 势函数主动学习框架"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "ase>=3.26.0",
    "numpy>=2.4.0",
    "pynep",
    "pyyaml>=6.0.3",
    "scipy>=1.11.0",
    "tqdm>=4.67.1",
]

[project.scripts]
learnep-init = "learnep.initialize:main"
learnep = "learnep.main:main"
learnep-config = "learnep.config:main"
learnep-first-train = "learnep.first_train:main"
learnep-init-config = "learnep.init_config:main"

[tool.uv]
package = true

[[tool.uv.index]]
url = "https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple"
default = true

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["learnep*"]
exclude = ["test*", "nep_maker*"]

[tool.setuptools.package-data]
learnep = ["*.yaml"]

[tool.uv.sources]
pynep = { git = "https://github.com/bigd4/PyNEP.git" }
